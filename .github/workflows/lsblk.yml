name: Build Dynamic lsblk for /system/lib64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config bison flex gettext autopoint \
            gcc-aarch64-linux-gnu

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          export CC=aarch64-linux-gnu-gcc
          # 1. 强制不链接 ncurses 和 tinfo 以解决图 3439 的报错
          # 2. 设置运行时搜索路径为 /system/lib64
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64"

          ./configure \
            --host=aarch64-linux-gnu \
            --disable-all-programs \
            --enable-lsblk \
            --enable-libblkid \
            --enable-libmount \
            --enable-libsmartcols \
            --enable-shared \
            --disable-static \
            --without-udev \
            --without-ncurses \
            --without-ncursesw \
            --without-tinfo \
            --without-readline \
            --without-python \
            --without-cap-ng \
            --disable-bash-completion \
            --disable-nls \
            --disable-widechar

          # 解决图 3440 的报错：手动构建依赖库的 .la 文件但不打包它们
          make libblkid.la libmount.la libsmartcols.la -j$(nproc)
          
          # 编译最终的 lsblk
          make lsblk -j$(nproc)
          
          # 瘦身
          aarch64-linux-gnu-strip lsblk

      - name: Check Dependencies
        run: |
          # 这一步非常重要，请在日志中确认 NEEDED 部分
          # 它应该列出 libblkid.so.1, libmount.so.1, libsmartcols.so.1
          aarch64-linux-gnu-readelf -d lsblk | grep NEEDED

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsblk-dynamic
          path: lsblk
