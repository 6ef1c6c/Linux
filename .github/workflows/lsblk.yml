name: Build NDK-Native lsblk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config bison flex gettext autopoint

      - name: Set up NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b # 使用稳定版 NDK

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          # NDK 编译器路径配置
          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=33 # 对应 Android 13，你可以根据需要调整
          
          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          export AS=$CC
          export LD=$TOOLCHAIN/bin/ld.lld
          export STRIP=$TOOLCHAIN/bin/llvm-strip
          
          # 设置 LDFLAGS 动态链接到你的 /system/lib64 库
          # 注意：这里链接的是 Android 原生 libc.so，不再是 libc.so.6
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64"

          ./configure \
            --host=$TARGET \
            --disable-all-programs \
            --enable-lsblk \
            --enable-libblkid \
            --enable-libmount \
            --enable-libsmartcols \
            --enable-shared \
            --disable-static \
            --without-udev \
            --without-ncurses \
            --without-ncursesw \
            --without-tinfo \
            --without-python \
            --disable-bash-completion \
            --disable-nls

          # 编译
          make lsblk -j$(nproc)
          
          # 提取真身并瘦身
          cp .libs/lsblk lsblk_ndk
          $STRIP lsblk_ndk

      - name: Verify Linkage
        run: |
          # 检查是否链接到了 Android 的 libc.so
          readelf -d lsblk_ndk | grep NEEDED

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsblk-ndk-native
          path: lsblk_ndk
