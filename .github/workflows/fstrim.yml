name: Build Ultimate Static fstrim

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Tools
        run: |
          sudo apt-get update
          # 安装交叉编译器和所有构建工具
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
                                 autoconf automake libtool pkg-config gettext autopoint bison flex

      - name: Build
        run: |
          ./autogen.sh
          # 核心修复：添加 -all-static 确保不留下任何动态库依赖
          export CC=aarch64-linux-gnu-gcc
          ./configure --host=aarch64-linux-gnu \
                      --prefix=/usr \
                      LDFLAGS="-static -all-static" \
                      --enable-static \
                      --disable-shared \
                      --disable-all-programs \
                      --enable-fstrim \
                      --enable-libmount \
                      --enable-libblkid \
                      --enable-libuuid \
                      --without-ncurses \
                      --without-python \
                      --without-systemd \
                      --without-udev
          
          make -j$(nproc) fstrim
          
          # 极致瘦身
          aarch64-linux-gnu-strip --strip-all fstrim

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fstrim-static-final
          path: fstrim
