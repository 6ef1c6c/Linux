name: Build Ultimate Static fstrim

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Critical Tools
        run: |
          sudo apt-get update
          # 必须安装交叉编译器的 libc 和静态库
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
                                 libc6-dev-arm64-cross \
                                 autoconf automake libtool pkg-config gettext autopoint bison flex

      - name: Build
        run: |
          ./autogen.sh
          
          # 强制环境变量
          export CC=aarch64-linux-gnu-gcc
          # 终极奥义：在 LDFLAGS 中加入 -static --static 和 -all-static
          export LDFLAGS="-static --static -all-static"
          
          ./configure --host=aarch64-linux-gnu \
                      --disable-shared \
                      --enable-static \
                      --disable-all-programs \
                      --enable-fstrim \
                      --enable-libmount \
                      --enable-libblkid \
                      --enable-libuuid \
                      --without-python \
                      --without-systemd \
                      --without-udev \
                      --without-ncurses
          
          # 在 make 阶段再次强制静态链接参数，防止脚本漏掉
          make -j$(nproc) fstrim LDFLAGS="-all-static"
          
          # 验证文件是否真的是全静态链接
          if ldd fstrim 2>&1 | grep -q "not a dynamic executable"; then
            echo "Verification Success: Truly Static Binary"
          else
            echo "Warning: Binary might still be dynamic!"
          fi
          
          aarch64-linux-gnu-strip --strip-all fstrim

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fstrim-android-aarch64
          path: fstrim
