name: Build Ultimate Static fstrim

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1 # 拉取最新源码

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          # 安装构建必需的基础工具，去掉了残缺的交叉编译器
          sudo apt-get install -y autoconf automake libtool pkg-config gettext bison flex wget tar file

      - name: Setup musl-cross Toolchain
        run: |
          # 终极杀器：下载专门用于生成全静态二进制文件的独立 musl 工具链
          wget https://musl.cc/aarch64-linux-musl-cross.tgz
          tar -xf aarch64-linux-musl-cross.tgz
          
          # 将解压后的工具链加入 GitHub Actions 的全局环境变量中
          echo "$(pwd)/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          # 极简且正确的环境变量：只用 -static，绝不多加会导致 configure 报错的废参数
          export CC="aarch64-linux-musl-gcc"
          export CFLAGS="-Os -static"
          export LDFLAGS="-static"
          
          # 运行配置脚本
          # --host 指定目标架构，--disable-nls 禁用会导致报错的本地化语言支持
          ./configure --host=aarch64-linux-musl \
                      --disable-shared \
                      --enable-static \
                      --disable-all-programs \
                      --enable-fstrim \
                      --enable-libmount \
                      --enable-libblkid \
                      --enable-libuuid \
                      --without-python \
                      --without-systemd \
                      --without-udev \
                      --without-ncurses \
                      --without-cap-ng \
                      --disable-nls \
                      --disable-bash-completion
          
          # 精准狙击：只编译 fstrim 及其必需的库，防止其他无用组件引发报错
          make fstrim LDFLAGS="-static"
          
          # 剥离调试信息，极大缩小体积
          aarch64-linux-musl-strip --strip-all fstrim
          
          # 输出文件信息，验证是否真的是静态链接
          echo "========================================"
          file fstrim
          echo "========================================"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fstrim-android-aarch64-musl-static
          path: fstrim
