name: Build Static AArch64 fstrim

# 改为纯手动触发，避免每次 push 都报错喵
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          # 增加 autopoint 解决刚才的报错，补充编译必需包
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
                                 autoconf automake libtool pkg-config gettext autopoint bison flex

      - name: Build and Compile fstrim
        run: |
          ./autogen.sh
          # 一次性配置：针对 AArch64、全静态、极致体积、关闭不必要功能
          # 关键点：使用 --host 交叉编译，强制指定 LDFLAGS 静态链接
          ./configure --host=aarch64-linux-gnu \
                      CC=aarch64-linux-gnu-gcc \
                      CFLAGS="-O3 -s" \
                      LDFLAGS="-static -Wl,--gc-sections" \
                      --enable-static \
                      --disable-shared \
                      --disable-all-programs \
                      --enable-fstrim \
                      --enable-libmount \
                      --enable-libblkid \
                      --enable-libuuid \
                      --without-ncurses \
                      --without-python \
                      --without-tinfo \
                      --without-systemd
          
          # 只编译 fstrim 和它的依赖库
          make -j$(nproc) fstrim
          
          # 极致瘦身：移除所有符号表和调试信息
          aarch64-linux-gnu-strip --strip-all fstrim

      - name: Upload fstrim Binary
        uses: actions/upload-artifact@v4
        with:
          name: fstrim-android-aarch64
          path: fstrim
