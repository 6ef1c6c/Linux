name: Build Vim for Android (AArch64)

on:
  workflow_dispatch: # 手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cross Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu wget git make

      - name: Build Ncurses 6.5
        run: |
          wget https://invisible-mirror.net/archives/ncurses/ncurses-6.5.tar.gz
          tar -xf ncurses-6.5.tar.gz
          cd ncurses-6.5
          ./configure --host=aarch64-linux-gnu \
                      --prefix=$(pwd)/build_static \
                      --with-shared=no --enable-static --enable-widec \
                      --without-debug CPPFLAGS="-P"
          make -j$(nproc)
          # 手动理库，确保 Vim 能找到静态文件
          mkdir -p build_static/lib build_static/include/ncursesw
          cp lib/libncursesw.a build_static/lib/
          cp include/*.h build_static/include/ncursesw/
          cp include/*.h build_static/include/

      - name: Build Vim
        run: |
          git clone --depth 1 https://github.com/vim/vim.git
          cd vim/src
          # 强制指定 cross_compiling=yes 绕过加载器报错
          ./configure --host=aarch64-linux-gnu \
                      CC=aarch64-linux-gnu-gcc \
                      --with-tlib=ncursesw --enable-gui=no --with-features=normal \
                      cross_compiling=yes \
                      ac_cv_sizeof_int=4 ac_cv_sizeof_long=8 ac_cv_sizeof_off_t=8 ac_cv_sizeof_voidp=8 \
                      CPPFLAGS="-I$(pwd)/../../ncurses-6.5/build_static/include" \
                      LDFLAGS="-static -L$(pwd)/../../ncurses-6.5/build_static/lib -Wl,-dynamic-linker,/system/bin/linker64" \
                      LIBS="-lncursesw"
          make -j$(nproc)
          aarch64-linux-gnu-strip vim # 瘦身

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vim-android-aarch64
          path: vim/src/vim
