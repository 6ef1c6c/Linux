name: Build Android 13 Shared Libs (Ultimate)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Build Core Libraries
        run: |
          ./autogen.sh
          
          # 直接使用 GitHub Runner 自带的 NDK 路径
          # Android NDK 默认位于 $ANDROID_NDK_LATEST_HOME
          export TOOLCHAIN=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android33
          export CC=$TOOLCHAIN/bin/$TARGET-clang
          export AR=$TOOLCHAIN/bin/llvm-ar
          export STRIP=$TOOLCHAIN/bin/llvm-strip

          # 配置参数
          ./configure --host=aarch64-linux-android \
                      --prefix=/system \
                      --enable-shared \
                      --disable-static \
                      --disable-all-programs \
                      --enable-libuuid \
                      --enable-libblkid \
                      --enable-libmount \
                      --enable-libsmartcols \
                      --without-python \
                      --without-systemd \
                      --without-udev \
                      --without-ncurses \
                      --disable-makeinstall-chown

          make -j$(nproc)
          
          # 整理产物
          mkdir -p output/lib64
          mkdir -p output/pkgconfig
          
          # 拷贝库文件（包含带版本号的原始文件）
          cp .libs/libmount.so* output/lib64/
          cp .libs/libblkid.so* output/lib64/
          cp .libs/libuuid.so* output/lib64/
          cp .libs/libsmartcols.so* output/lib64/
          
          # 拷贝 pkg-config 文件
          cp libmount/libmount.pc output/pkgconfig/
          cp libblkid/libblkid.pc output/pkgconfig/
          cp uuid/libuuid.pc output/pkgconfig/
          
          # 瘦身
          $STRIP --strip-unneeded output/lib64/*.so*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android13-libs-bundle
          path: output/
