name: Build Android 13 Shared Libs (Ultimate)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext bison flex autopoint build-essential pkg-config libtool autoconf automake

      - name: Build Core Libraries
        run: |
          ./autogen.sh
          
          # 设置 NDK 交叉编译环境变量
          export TOOLCHAIN=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android33
          export CC=$TOOLCHAIN/bin/$TARGET-clang
          export AR=$TOOLCHAIN/bin/llvm-ar
          export STRIP=$TOOLCHAIN/bin/llvm-strip

          # --- 核心攻克步骤：针对 Android Bionic 库打补丁 ---
          # 修复 'endusershell' 和 'setusershell' 缺失的问题
          sed -i '1i void setusershell(void) {}' lib/shells.c
          sed -i '1i void endusershell(void) {}' lib/shells.c
          sed -i '1i char *getusershell(void) { return 0; }' lib/shells.c

          # 配置参数：尽量开启磁盘相关功能，禁用 Android 不支持的系统组件
          ./configure --host=aarch64-linux-android \
                      --prefix=/system \
                      --enable-shared \
                      --disable-static \
                      --disable-all-programs \
                      --enable-libuuid \
                      --enable-libblkid \
                      --enable-libmount \
                      --enable-libsmartcols \
                      --disable-bash-completion \
                      --disable-pylibmount \
                      --without-python \
                      --without-systemd \
                      --without-udev \
                      --without-ncurses \
                      --without-selinux \
                      --disable-widechar \
                      --disable-use-tty-group \
                      --disable-makeinstall-chown \
                      --disable-chfn-chsh \
                      --disable-login \
                      --disable-su \
                      --disable-runuser \
                      --disable-newgrp

          make -j$(nproc)
          
          # 整理产物目录
          mkdir -p output/lib64
          mkdir -p output/pkgconfig
          
          # 拷贝库文件，使用 -d 保留链接关系
          cp -d .libs/libmount.so* output/lib64/
          cp -d .libs/libblkid.so* output/lib64/
          cp -d .libs/libuuid.so* output/lib64/
          cp -d .libs/libsmartcols.so* output/lib64/
          
          # 拷贝 pkg-config 文件以便未来本地编译
          cp libmount/libmount.pc output/pkgconfig/
          cp libblkid/libblkid.pc output/pkgconfig/
          cp uuid/libuuid.pc output/pkgconfig/
          
          # 对真实文件执行瘦身，跳过软链接
          find output/lib64/ -type f -name "*.so*" -exec $STRIP --strip-unneeded {} +

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android13-libs-bundle
          path: output/
