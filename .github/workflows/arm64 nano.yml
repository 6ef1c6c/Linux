name: Build static nano for Android (arm64) - latest version

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y make wget curl

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "NDK_PATH=${PWD}/android-ndk-r25c" >> $GITHUB_ENV

      - name: Set up NDK toolchain and create legacy symlinks
        run: |
          export TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin
          export TARGET=aarch64-linux-android
          export API=21

          # Add toolchain directory to PATH
          echo "$TOOLCHAIN" >> $GITHUB_PATH

          # Create symlinks for legacy compiler names (some configure scripts expect these)
          cd $TOOLCHAIN
          ln -sf $TARGET$API-clang $TARGET-gcc
          ln -sf $TARGET$API-clang++ $TARGET-g++
          ln -sf llvm-ar $TARGET-ar
          ln -sf llvm-ranlib $TARGET-ranlib

          # Export variables for later steps
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "API=$API" >> $GITHUB_ENV
          echo "CC=$TARGET$API-clang" >> $GITHUB_ENV
          echo "CXX=$TARGET$API-clang++" >> $GITHUB_ENV
          echo "AR=llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=llvm-strip" >> $GITHUB_ENV

      - name: Get latest ncurses version
        id: ncurses
        run: |
          LATEST=$(curl -s ftp://ftp.gnu.org/gnu/ncurses/ | grep -oP 'ncurses-\K[0-9]+\.[0-9]+' | sort -V | tail -n1)
          echo "version=$LATEST"
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "url=ftp://ftp.gnu.org/gnu/ncurses/ncurses-$LATEST.tar.gz" >> $GITHUB_OUTPUT

      - name: Get latest nano version
        id: nano
        run: |
          HTML=$(curl -s https://www.nano-editor.org/download.php)
          LATEST=$(echo "$HTML" | grep -oP 'nano-\K[0-9]+\.[0-9]+(?=\.tar\.xz)' | head -1)
          if [ -z "$LATEST" ]; then
            MAJOR=$(curl -s https://www.nano-editor.org/dist/ | grep -oP 'v\K[0-9]+' | sort -n | tail -1)
            LATEST=$(curl -s https://www.nano-editor.org/dist/v$MAJOR/ | grep -oP "nano-$MAJOR\.[0-9]+\.tar\.xz" | grep -oP "nano-\K[0-9]+\.[0-9]+" | sort -V | tail -1)
          fi
          echo "version=$LATEST"
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "url=https://www.nano-editor.org/dist/v${LATEST%%.*}/nano-$LATEST.tar.xz" >> $GITHUB_OUTPUT

      - name: Download ncurses source
        run: |
          wget "${{ steps.ncurses.outputs.url }}"
          tar xf ncurses-*.tar.gz

      - name: Build ncurses (static)
        run: |
          cd ncurses-*
          make distclean || true
          ./configure \
            --host=$TARGET \
            --prefix=$PWD/install \
            --without-shared \
            --with-normal \
            --without-debug \
            --without-ada \
            --enable-widec \
            --enable-termcap \
            --with-terminfo-dirs=/system/etc/terminfo:/data/misc/terminfo \
            --with-default-terminfo-dir=/system/etc/terminfo \
            CFLAGS="-fPIE" \
            LDFLAGS="-pie -static-libgcc"
          make -j$(nproc)
          make install.progs install.libs install.data
          echo "NCURSES_DIR=$PWD/install" >> $GITHUB_ENV
          cd ..

      - name: Download nano source
        run: |
          wget "${{ steps.nano.outputs.url }}"
          tar xf nano-*.tar.xz

      - name: Configure and compile nano (static)
        run: |
          cd nano-*
          export CFLAGS="-fPIE -O2 -I$NCURSES_DIR/include"
          export LDFLAGS="-pie -static-libgcc -L$NCURSES_DIR/lib"
          export LIBS="-lncursesw -ltinfo"

          ./configure \
            --host=$TARGET \
            --build=x86_64-linux-gnu \
            --target=$TARGET \
            --prefix=$PWD/install \
            --disable-shared \
            --enable-static \
            --enable-utf8 \
            --disable-nls \
            --disable-speller \
            --with-terminfo-dirs=/system/etc/terminfo:/data/misc/terminfo \
            --with-default-terminfo-dir=/system/etc/terminfo \
            NCURSES_LIBS="-lncursesw" \
            ac_cv_func_setenv=yes

          make -j$(nproc)
          make install

      - name: Strip and package
        run: |
          cd nano-*/install/bin
          $STRIP nano
          echo "=== Checking linked libraries (should only show system libs) ==="
          readelf -d nano | grep NEEDED || true
          mkdir -p $GITHUB_WORKSPACE/nano-android/terminfo
          cp -r $NCURSES_DIR/share/terminfo/* $GITHUB_WORKSPACE/nano-android/terminfo/
          cp nano $GITHUB_WORKSPACE/nano-android/
          cd $GITHUB_WORKSPACE/nano-android
          tar -czf $GITHUB_WORKSPACE/nano-android-static.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nano-android-static-latest
          path: nano-android-static.tar.gz
