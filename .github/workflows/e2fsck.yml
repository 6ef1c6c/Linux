name: Manual Build e2fsprogs Static
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: 'tytso/e2fsprogs'
          ref: 'master'

      - name: Install NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip
          echo "NDK_PATH=$GITHUB_WORKSPACE/android-ndk-r26b" >> $GITHUB_ENV

      - name: Configure and Build
        run: |
          mkdir build && cd build
          TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
          
          # 核心配置：加入 --disable-elf-shlibs 确保完全不生成动态库
          ../configure --host=aarch64-linux-android --build=x86_64-linux-gnu \
              --enable-libuuid=internal \
              --enable-libblkid=internal \
              --disable-nls \
              --disable-elf-shlibs \
              CC=$TOOLCHAIN/bin/aarch64-linux-android29-clang \
              CFLAGS="-O3 --target=aarch64-linux-android29" \
              LDFLAGS="-static" \
              cross_compiling=yes

          # 关键修正：先执行顶层 make subs，生成所有头文件(如 dirpaths.h)
          # 然后再编译核心工具，并强制拷贝避开硬链接权限问题
          make -j$(nproc) LN="cp -p" LN_S="cp -p" subs
          make -j$(nproc) LN="cp -p" LN_S="cp -p" -C e2fsck
          make -j$(nproc) LN="cp -p" LN_S="cp -p" -C resize

      - name: Upload Static Binaries
        uses: actions/upload-artifact@v4
        with:
          name: e2fsprogs-1.47.3-fixed
          path: |
            build/e2fsck/e2fsck
            build/resize/resize2fs
