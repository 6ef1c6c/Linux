name: Build static Python for Android (arm64)

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y make wget

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "NDK_PATH=${PWD}/android-ndk-r25c" >> $GITHUB_ENV

      # 创建独立工具链，生成传统命名的 gcc/g++ 包装器（实际调用 clang）
      - name: Create standalone toolchain
        run: |
          export PATH=$NDK_PATH/build/tools:$PATH
          $NDK_PATH/build/tools/make-standalone-toolchain.sh \
            --arch=arm64 \
            --api=21 \
            --install-dir=/tmp/standalone-toolchain
          echo "/tmp/standalone-toolchain/bin" >> $GITHUB_PATH
          echo "STANDALONE_TOOLCHAIN=/tmp/standalone-toolchain" >> $GITHUB_ENV

      # 设置交叉编译环境变量，后续步骤可直接使用
      - name: Set up environment variables
        run: |
          export TARGET=aarch64-linux-android
          export TOOLCHAIN=/tmp/standalone-toolchain
          echo "CC=$TOOLCHAIN/bin/$TARGET-gcc" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/bin/$TARGET-g++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/bin/$TARGET-ar" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/bin/$TARGET-ranlib" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/bin/$TARGET-strip" >> $GITHUB_ENV
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "API=21" >> $GITHUB_ENV

      # 编译 OpenSSL 3.0.13（静态库）
      - name: Build OpenSSL (static)
        run: |
          wget https://www.openssl.org/source/openssl-3.0.13.tar.gz
          tar xf openssl-3.0.13.tar.gz
          cd openssl-3.0.13
          # 清理之前的构建（如果存在）
          make distclean || true
          export PATH=$TOOLCHAIN/bin:$PATH
          export CROSS_COMPILE=$TARGET-
          # OpenSSL 的 android-arm64 配置会利用独立工具链中的传统命令
          ./Configure android-arm64 -D__ANDROID_API__=$API --prefix=$PWD/install no-shared
          make -j$(nproc)
          make install_sw
          echo "OPENSSL_DIR=$PWD/install" >> $GITHUB_ENV
          cd ..

      # 编译 libffi 3.4.4（静态库）
      - name: Build libffi (static)
        run: |
          wget ftp://sourceware.org/pub/libffi/libffi-3.4.4.tar.gz
          tar xf libffi-3.4.4.tar.gz
          cd libffi-3.4.4
          make distclean || true
          ./configure --host=$TARGET --prefix=$PWD/install --disable-shared --enable-static
          make -j$(nproc)
          make install
          echo "LIBFFI_DIR=$PWD/install" >> $GITHUB_ENV
          cd ..

      # 编译 zlib 1.3.1（静态库）
      - name: Build zlib (static)
        run: |
          wget https://zlib.net/fossils/zlib-1.3.1.tar.gz
          tar xf zlib-1.3.1.tar.gz
          cd zlib-1.3.1
          make distclean || true
          export CHOST=$TARGET
          ./configure --prefix=$PWD/install --static
          make -j$(nproc)
          make install
          echo "ZLIB_DIR=$PWD/install" >> $GITHUB_ENV
          cd ..

      # 下载 Python 3.11.6 源码
      - name: Download Python source
        run: |
          wget https://www.python.org/ftp/python/3.11.6/Python-3.11.6.tar.xz
          tar xf Python-3.11.6.tar.xz

      # 配置并编译 Python（完全静态链接）
      - name: Configure and compile Python (static)
        run: |
          cd Python-3.11.6
          export PATH=$TOOLCHAIN/bin:$PATH

          # 预定义 config.site 避免交叉编译时的函数检测失败
          cat > config.site << 'EOF'
          ac_cv_file__dev_ptc=no
          ac_cv_file__dev_ptmx=no
          ac_cv_have_long_long_format=yes
          ac_cv_func_bind_textdomain_codeset=yes
          ac_cv_func_faccessat=yes
          ac_cv_func_fdatasync=yes
          ac_cv_func_fsync=yes
          ac_cv_func_futimens=yes
          ac_cv_func_futimes=yes
          ac_cv_func_futimesat=yes
          ac_cv_func_utimensat=yes
          ac_cv_func_utimes=yes
          ac_cv_func_lchmod=yes
          ac_cv_func_lchown=yes
          ac_cv_func_linkat=yes
          ac_cv_func_mkdirat=yes
          ac_cv_func_mkfifoat=yes
          ac_cv_func_mknodat=yes
          ac_cv_func_openat=yes
          ac_cv_func_readlinkat=yes
          ac_cv_func_renameat=yes
          ac_cv_func_symlinkat=yes
          ac_cv_func_unlinkat=yes
          ac_cv_func_dup3=yes
          ac_cv_func_pipe2=yes
          ac_cv_func_getentropy=yes
          ac_cv_func_getrandom=yes
          EOF

          export CPPFLAGS="-I$ZLIB_DIR/include -I$LIBFFI_DIR/include -I$OPENSSL_DIR/include"
          export LDFLAGS="-L$ZLIB_DIR/lib -L$LIBFFI_DIR/lib -L$OPENSSL_DIR/lib -Wl,-Bstatic -lz -lffi -lssl -lcrypto -Wl,-Bdynamic"
          export CONFIG_SITE=$PWD/config.site

          ./configure \
            --host=$TARGET \
            --build=x86_64-linux-gnu \
            --target=$TARGET \
            --prefix=$PWD/install \
            --disable-ipv6 \
            --enable-optimizations \
            --with-openssl=$OPENSSL_DIR \
            --with-openssl-rpath=no \
            --with-system-ffi=no \
            --with-system-expat=no \
            --with-ensurepip=yes \
            --disable-shared

          make -j$(nproc)
          make install

      # 剥离调试信息并打包
      - name: Strip and package
        run: |
          cd Python-3.11.6/install/bin
          $STRIP python3
          # 验证静态链接：只显示系统库
          echo "=== Checking linked libraries (should only show system libs) ==="
          readelf -d python3 | grep NEEDED || true
          tar -czf $GITHUB_WORKSPACE/python3-android-static.tar.gz python3

      # 上传最终产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python3-android-static
          path: python3-android-static.tar.gz
