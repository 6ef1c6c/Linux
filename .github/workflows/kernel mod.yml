name: Build Ring0 KO (Strict Version Match)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison git

      - name: Setup Android Clang (GKI Toolchain)
        run: |
          # 下载 5.10 GKI 推荐的 Clang 版本 (r450784d)
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r450784d.tar.gz
          mkdir clang && tar -C clang -xzf clang-r450784d.tar.gz

      - name: Fetch GKI Kernel Headers
        run: |
          # 拉取 5.10 分支的通用内核源码
          git clone --depth 1 https://android.googlesource.com/kernel/common -b android12-5.10 kernel-source

      - name: FORCE VERSION ALIGNMENT
        run: |
          cd kernel-source
          # 1. 强制修改主版本号
          sed -i 's/^VERSION =.*/VERSION = 5/' Makefile
          sed -i 's/^PATCHLEVEL =.*/PATCHLEVEL = 10/' Makefile
          sed -i 's/^SUBLEVEL =.*/SUBLEVEL = 117/' Makefile
          
          # 2. 强制抹除默认的 EXTRAVERSION 并写入你的特定后缀
          # 目标: 5.10.117-android12-9-g287b9af3dd02
          sed -i 's/^EXTRAVERSION =.*/EXTRAVERSION = -android12-9-g287b9af3dd02/' Makefile
          
          # 3. 禁用内核自动添加的 "+" 号 (防止版本变成 5.10.117+)
          scripts/config --file .config --disable LOCALVERSION_AUTO
          echo "-android12-9-g287b9af3dd02" > localversion

      - name: Prepare GKI Config
        run: |
          export PATH=${{ github.workspace }}/clang/bin:$PATH
          cd kernel-source
          # 使用通用的 GKI 配置作为基准
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 gki_defconfig

      - name: Build Ring0 Module
        run: |
          export PATH=${{ github.workspace }}/clang/bin:$PATH
          cd kernel-source
          # KDIR 指向当前内核源码，M 指向工作区根目录（存放 ring0_exec.c 和 Makefile 的地方）
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 M=${{ github.workspace }} modules

      - name: Verify Vermagic
        run: |
          # 在上传前检查生成文件的版本信息，确保对齐成功
          modinfo ./ring0_exec.ko | grep vermagic

      - name: Upload Ring0 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ring0_5.10.117_aligned
          path: ./*.ko
