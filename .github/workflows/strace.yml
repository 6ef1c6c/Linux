- name: Fetch strace static binary from Alpine
  run: |
    # 下载 Alpine 的 strace 包 (aarch64)
    wget https://dl-cdn.alpinelinux.org/alpine/edge/main/aarch64/strace-6.19-r0.apk
    
    # 解压 APK 包
    tar xzf strace-6.19-r0.apk
    
    # 验证静态链接
    file usr/bin/strace | grep 'statically linked' || { echo 'Error: not static'; exit 1; }
    
    # 重命名并放置到工作区
    mv usr/bin/strace ./strace-static-arm64
    
    # 清理临时文件
    rm -rf usr/ strace-6.19-r0.apk
